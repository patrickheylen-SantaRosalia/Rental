<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Santa Rosalia Luxury Rental</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    .hero { 
      background-image: url('IMG_RS1.jpeg'); 
      background-size: cover;
      background-position: center;
    }
    img {
      width: 100%;
      height: 240px;
      object-fit: cover;
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-800">

  <!-- HEADER -->
  <header class="bg-white shadow sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-emerald-700">Santa Rosalia Retreat</h1>
      <div class="flex gap-4">
        <button onclick="switchLang('en')" class="lang-btn">🇬🇧 EN</button>
        <button onclick="switchLang('nl')" class="lang-btn">🇳🇱 NL</button>
        <button onclick="switchLang('fr')" class="lang-btn">🇫🇷 FR</button>
        <button onclick="switchLang('es')" class="lang-btn">🇪🇸 ES</button>
      </div>
    </div>
  </header>

  <!-- HERO -->
  <section id="hero" class="hero h-screen flex items-center text-white">
    <div class="max-w-6xl mx-auto px-6 text-center">
      <h2 data-lang="en" class="text-5xl md:text-6xl font-bold mb-4">Luxury Villa in Santa Rosalia</h2>
      <h2 data-lang="nl" class="hidden text-5xl md:text-6xl font-bold mb-4">Luxe Villa in Santa Rosalia</h2>
      <h2 data-lang="fr" class="hidden text-5xl md:text-6xl font-bold mb-4">Villa de Luxe à Santa Rosalia</h2>
      <h2 data-lang="es" class="hidden text-5xl md:text-6xl font-bold mb-4">Villa de Lujo en Santa Rosalia</h2>
    </div>
  </section>

  <!-- GALLERY -->
  <section class="max-w-6xl mx-auto px-6 py-16">
    <h2 data-lang="en" class="text-4xl font-bold text-center mb-12">Photo Gallery</h2>
    <h2 data-lang="nl" class="hidden text-4xl font-bold text-center mb-12">Fotogalerij</h2>
    <h2 data-lang="fr" class="hidden text-4xl font-bold text-center mb-12">Galerie Photos</h2>
    <h2 data-lang="es" class="hidden text-4xl font-bold text-center mb-12">Galería de Fotos</h2>
    
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
      <img src="IMG_RS1.jpeg" onerror="this.style.display='none'" alt="Foto 1">
      <img src="IMG_RS2.jpeg" onerror="this.style.display='none'" alt="Foto 2">
      <img src="IMG_RS3.jpeg" onerror="this.style.display='none'" alt="Foto 3">
      <img src="IMG_RS4.jpeg" onerror="this.style.display='none'" alt="Foto 4">
      <img src="IMG_RS5.jpeg" onerror="this.style.display='none'" alt="Foto 5">
      <img src="IMG_RS6.jpeg" onerror="this.style.display='none'" alt="Foto 6">
      <img src="IMG_RS7.jpeg" onerror="this.style.display='none'" alt="Foto 7">
      <img src="IMG_RS8.jpeg" onerror="this.style.display='none'" alt="Foto 8">
    </div>
  </section>

  <script>
    function switchLang(lang) {
      document.querySelectorAll('[data-lang]').forEach(el => {
        el.classList.toggle('hidden', el.getAttribute('data-lang') !== lang);
      });
    }
    switchLang('en');
  </script>

</body>
</html>
